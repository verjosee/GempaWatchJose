<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GempaWatch • BMKG Live</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Google Sans', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem;
      background: #0a0f1a;
      background-image: radial-gradient(ellipse at 40% 30%, rgba(239, 68, 68, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 60% 70%, rgba(234, 179, 8, 0.04) 0%, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .glass-panel {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.8rem;
      padding: 1.4rem 1.1rem 1.6rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7);
      color: #e2e8f0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .logo-icon {
      font-size: 1.8rem;
      animation: shake 0.5s ease-in-out infinite;
      animation-play-state: paused;
    }

    .logo-icon.active {
      animation-play-state: running;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(3deg); }
      75% { transform: rotate(-3deg); }
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: #f1f5f9;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 0.65rem;
      color: #94a3b8;
      font-weight: 400;
    }

    .live-badge {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      padding: 0.35rem 0.9rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: #f87171;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      letter-spacing: 0.2px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }

    .latest-card {
      background: linear-gradient(145deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
      border-radius: 1.5rem;
      padding: 1.3rem 1.1rem;
      border: 1px solid rgba(239, 68, 68, 0.2);
      margin-bottom: 1rem;
      text-align: center;
      transition: all 0.3s;
      overflow: hidden;
    }

    .latest-label {
      font-size: 0.7rem;
      color: #f87171;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .magnitude {
      font-size: 3.8rem;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
      letter-spacing: -1.5px;
      text-shadow: 0 0 25px rgba(239, 68, 68, 0.5);
    }

    .mag-label {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-bottom: 0.2rem;
    }

    .location-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      margin: 0.3rem 0;
      line-height: 1.35;
      word-break: break-word;
      padding: 0 0.3rem;
    }

    .time-info {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-bottom: 0.6rem;
    }

    .shakemap-container {
      margin: 0.8rem 0;
      border-radius: 0.9rem;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.1);
      background: #020617;
      max-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shakemap-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 250px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-top: 0.6rem;
    }

    .detail-item {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 0.9rem;
      padding: 0.7rem 0.3rem;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .detail-icon {
      font-size: 1.1rem;
      margin-bottom: 0.1rem;
    }

    .detail-label {
      font-size: 0.58rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .detail-value {
      font-size: 0.78rem;
      font-weight: 600;
      color: #e2e8f0;
      word-break: break-word;
      line-height: 1.2;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .quake-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 0.2rem;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
      -webkit-overflow-scrolling: touch;
    }

    .quake-list::-webkit-scrollbar {
      width: 3px;
    }
    .quake-list::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    .quake-item {
      background: rgba(30, 41, 59, 0.6);
      border-radius: 1rem;
      padding: 0.8rem 0.9rem;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      touch-action: manipulation;
    }

    .quake-item:active {
      background: rgba(37, 99, 235, 0.15);
      transform: scale(0.98);
    }

    .mag-badge {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.45rem 0.6rem;
      border-radius: 0.8rem;
      min-width: 44px;
      text-align: center;
      border: 1px solid rgba(239, 68, 68, 0.3);
      flex-shrink: 0;
    }

    .mag-badge.green {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
      border-color: rgba(34, 197, 94, 0.3);
    }
    .mag-badge.yellow {
      background: rgba(234, 179, 8, 0.2);
      color: #facc15;
      border-color: rgba(234, 179, 8, 0.3);
    }
    .mag-badge.orange {
      background: rgba(249, 115, 22, 0.2);
      color: #fb923c;
      border-color: rgba(249, 115, 22, 0.3);
    }
    .mag-badge.red {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border-color: rgba(239, 68, 68, 0.3);
    }

    .quake-info {
      flex: 1;
      min-width: 0;
    }

    .quake-location {
      font-weight: 600;
      font-size: 0.82rem;
      color: #e2e8f0;
      line-height: 1.3;
      word-break: break-word;
    }

    .quake-meta {
      font-size: 0.65rem;
      color: #94a3b8;
      margin-top: 0.15rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.8rem;
      font-size: 0.65rem;
      color: #64748b;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .refresh-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 0.55rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
      touch-action: manipulation;
      letter-spacing: 0.2px;
      min-height: 40px;
    }

    .refresh-btn:active {
      background: #2563eb;
      color: white;
      transform: scale(0.95);
    }

    .error-msg {
      text-align: center;
      color: #ef4444;
      padding: 1.5rem;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .loading-text {
      text-align: center;
      color: #64748b;
      padding: 1.5rem;
      font-size: 0.85rem;
    }

    .footer-note {
      text-align: center;
      font-size: 0.6rem;
      color: #475569;
      margin-top: 0.5rem;
    }

    @media (min-width: 420px) {
      .magnitude { font-size: 4.5rem; }
      .location-name { font-size: 1.05rem; }
    }

    @media (min-width: 500px) {
      .glass-panel { padding: 1.6rem 1.3rem 1.8rem; }
      .detail-item { padding: 0.8rem 0.4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glass-panel">
      <div class="header">
        <div class="logo">
          <span class="logo-icon" id="shakeIcon">🌍</span>
          <div>
            <div class="logo-text">GempaWatch</div>
            <div class="logo-sub">BMKG • Real-time</div>
          </div>
        </div>
        <div class="live-badge">
          <span class="live-dot"></span> LIVE
        </div>
      </div>

      <div id="latestCard">
        <div class="latest-card">
          <div class="loading-text">⏳ Memuat data gempa terbaru...</div>
        </div>
      </div>

      <div class="section-title">📋 Daftar Gempa Terbaru</div>
      <div class="quake-list" id="quakeList">
        <div class="loading-text">Memuat data...</div>
      </div>

      <div class="refresh-row">
        <span id="lastUpdate">Diperbarui: --:--:--</span>
        <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
      </div>
      <div class="footer-note">Sumber: data.bmkg.go.id • Auto-update 2 menit</div>
    </div>
  </div>

  <script>
    (function() {
      const latestCard = document.getElementById('latestCard');
      const quakeList = document.getElementById('quakeList');
      const lastUpdate = document.getElementById('lastUpdate');
      const refreshBtn = document.getElementById('refreshBtn');
      const shakeIcon = document.getElementById('shakeIcon');

      const BMKG_AUTO_URL = 'https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json';
      const BMKG_FELT_URL = 'https://data.bmkg.go.id/DataMKG/TEWS/gempaterkini.json';

      function fixLocationText(text) {
        if (!text || typeof text !== 'string') return text;
        if (text.includes(' ')) return text.trim();

        const keywords = [
          'SELATAN', 'UTARA', 'TIMUR', 'BARAT', 'TENGAH', 'TENGGARA',
          'BENGKULU', 'SUMATERA', 'JAWA', 'KALIMANTAN', 'SULAWESI', 'PAPUA',
          'MALUKU', 'NUSA', 'TENGGARA', 'BARATDAYA', 'TIMURLAUT',
          'BARATLAUT', 'LAUT', 'DAYA'
        ];

        let fixed = text;
        for (const keyword of keywords) {
          if (fixed.endsWith(keyword) && fixed.length > keyword.length) {
            fixed = fixed.substring(0, fixed.length - keyword.length) + ' ' + keyword;
            break;
          }
        }
        if (!fixed.includes(' ')) {
          for (const keyword of keywords) {
            if (fixed.startsWith(keyword) && fixed.length > keyword.length) {
              fixed = keyword + ' ' + fixed.substring(keyword.length);
              break;
            }
          }
        }
        return fixed.trim();
      }

      function formatDateTime(dateStr) {
        try {
          const date = new Date(dateStr);
          if (isNaN(date.getTime())) return dateStr;
          return date.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) +
                 ' • ' + date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        } catch(e) { return dateStr; }
      }

      function formatDate(dateStr) {
        try { return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }); } catch(e) { return dateStr; }
      }

      function formatTime(dateStr) {
        try { return new Date(dateStr).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); } catch(e) { return ''; }
      }

      function getMagClass(mag) {
        if (mag < 3) return 'green';
        if (mag < 5) return 'yellow';
        if (mag < 7) return 'orange';
        return 'red';
      }

      function getShakemapURL(str) {
        if (!str || str === '-' || str === '') return null;
        return `https://data.bmkg.go.id/DataMKG/TEWS/${str}`;
      }

      function renderLatestQuake(data) {
        if (!data?.Infogempa?.gempa) {
          return '<div class="latest-card"><div class="error-msg">❌ Data gempa tidak tersedia</div></div>';
        }

        const g = data.Infogempa.gempa;
        const coords = g.Coordinates ? g.Coordinates.split(',').map(c => c.trim()) : ['-', '-'];
        const wilayah = fixLocationText(g.Wilayah);
        const shakemapURL = getShakemapURL(g.Shakemap);

        shakeIcon.classList.add('active');
        setTimeout(() => shakeIcon.classList.remove('active'), 2000);

        let shakemapHTML = '';
        if (shakemapURL) {
          shakemapHTML = `<div class="shakemap-container"><img class="shakemap-img" src="${shakemapURL}" alt="Shakemap BMKG" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;
        }

        return `
          <div class="latest-card">
            <div class="latest-label">⚠️ Gempa Terbaru</div>
            <div class="magnitude">${g.Magnitude}</div>
            <div class="mag-label">Magnitudo</div>
            <div class="location-name">📍 ${wilayah}</div>
            <div class="time-info">🕐 ${formatDateTime(g.DateTime)}</div>
            ${shakemapHTML}
            <div class="detail-grid">
              <div class="detail-item"><div class="detail-icon">🌊</div><div class="detail-label">Kedalaman</div><div class="detail-value">${g.Kedalaman}</div></div>
              <div class="detail-item"><div class="detail-icon">📏</div><div class="detail-label">Lintang</div><div class="detail-value">${coords[0]}</div></div>
              <div class="detail-item"><div class="detail-icon">📐</div><div class="detail-label">Bujur</div><div class="detail-value">${coords[1]}</div></div>
              <div class="detail-item"><div class="detail-icon">⚠️</div><div class="detail-label">Potensi</div><div class="detail-value">${g.Potensi || '-'}</div></div>
              <div class="detail-item"><div class="detail-icon">👥</div><div class="detail-label">Dirasakan</div><div class="detail-value">${g.Dirasakan || '-'}</div></div>
              <div class="detail-item"><div class="detail-icon">🗺️</div><div class="detail-label">Shakemap</div><div class="detail-value" style="font-size:0.6rem;">Tersedia</div></div>
            </div>
          </div>`;
      }

      function renderQuakeList(quakes) {
        if (!quakes?.length) return '<div class="loading-text">📭 Tidak ada data gempa</div>';
        return quakes.slice(0, 12).map(q => {
          const mag = parseFloat(q.Magnitude);
          const magClass = getMagClass(mag);
          const wilayah = fixLocationText(q.Wilayah);
          return `
            <div class="quake-item">
              <div class="mag-badge ${magClass}">${q.Magnitude}</div>
              <div class="quake-info">
                <div class="quake-location">📍 ${wilayah}</div>
                <div class="quake-meta">
                  <span>🌊 ${q.Kedalaman}</span>
                  <span>📅 ${formatDate(q.DateTime)}</span>
                  <span>🕐 ${formatTime(q.DateTime)}</span>
                </div>
              </div>
            </div>`;
        }).join('');
      }

      async function fetchData() {
        try {
          const [autoRes, feltRes] = await Promise.all([
            fetch(BMKG_AUTO_URL, { cache: 'no-cache' }),
            fetch(BMKG_FELT_URL, { cache: 'no-cache' })
          ]);
          const autoData = await autoRes.json();
          const feltData = await feltRes.json();

          latestCard.innerHTML = autoData?.Infogempa?.gempa ? renderLatestQuake(autoData) :
            '<div class="latest-card"><div class="error-msg">❌ Data gempa tidak tersedia</div></div>';

          quakeList.innerHTML = feltData?.Infogempa?.gempa?.length ? renderQuakeList(feltData.Infogempa.gempa) :
            '<div class="loading-text">📭 Belum ada data</div>';

          lastUpdate.textContent = 'Diperbarui: ' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        } catch (err) {
          console.error(err);
          latestCard.innerHTML = '<div class="latest-card"><div class="error-msg">❌ Gagal menghubungi BMKG.<br>Cek koneksi internet.</div></div>';
          quakeList.innerHTML = '<div class="loading-text">⚠️ Gagal memuat</div>';
        }
      }

      fetchData();
      const interval = setInterval(fetchData, 120000);
      refreshBtn.addEventListener('click', fetchData);
      window.addEventListener('beforeunload', () => clearInterval(interval));
    })();
  </script>
</body>
</html>
